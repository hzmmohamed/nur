name: Update repository labels

on:
  push:
    branches:
    - main
    paths:
    - '.github/workflows/labels.yml'

jobs:
  create-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      LABELS_JSON: |
        [
          {
            "name": "bug",
            "color": "d73a4a",
            "description": "Something isn't working"
          },
          {
            "name": "feature",
            "color": "a2eeef",
            "description": "New feature or request"
          },
          {
            "name": "in-progress",
            "color": "fef2c0",
            "description": "Work has started on this issue"
          },
          {
            "name": "critical",
            "color": "b60205",
            "description": "Must be fixed immediately"
          },
          {
            "name": "ui",
            "color": "d4c5f9",
            "description": "Related to the user interface"
          },
          {
            "name": "good first issue",
            "color": "7057ff",
            "description": "Good for newcomers"
          },
          {
            "name": "help wanted",
            "color": "008672",
            "description": "Extra attention is needed"
          },
          {
            "name": "needs more info",
            "color": "e99695",
            "description": "Lacks reproduction steps or clarity"
          }
        ]
    steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const labels = JSON.parse(process.env.LABELS_JSON);
          for (const label of labels) {
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                description: label.description || '',
                color: label.color
              });
            } catch (error) {
              // Check if the error is because the label already exists
              if (error.status === 422) {
                console.log(`Label '${label.name}' already exists. Skipping.`);
              } else {
                // Log other errors
                console.error(`Error creating label '${label.name}': ${error}`);
              }
            }
          }